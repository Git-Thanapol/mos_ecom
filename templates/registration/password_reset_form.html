{% extends "base/base.html" %}
{% block title %}Password Reset Form{% endblock %}
{% block start %}

<style>
  .para-style{
    text-align: center;
    padding: 10px;
  }
</style>

<!-- ============================ COMPONENT Forgot Password   ================================= -->
<section class="section-content padding-bottom">
  <div class="container-xl d-flex justify-content-center align-items-center mt-5">
    <div class="row justify-content-center w-100">
      <div class="col-xl-4">
        <div class="card mb-4">
          <div class="card-header" style="text-align: center; font-size: 25px;">รีเซ็ตรหัสผ่าน</div>
          <div class="card-body">
            <form method="POST">
              {% csrf_token %} {% include "base/alert.html" %}
              <p class="para-style">
                ลืมรหัสผ่าน? กรอกอีเมลของคุณด้านล่าง แล้วเราจะส่งคำแนะนำในการตั้งรหัสผ่านใหม่ไปให้
              </p>
              <div class="form-group">
                <input
                  class="form-control"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="กรอกอีเมลที่ลงทะเบียนไว้"
                  required
                  />
              </div>

              <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block">ส่งลิงก์รีเซ็ต</button>
              </div>
              <a href="{% url 'login' %}" class="float-right">กลับหน้าเข้าสู่ระบบ</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- ============================ COMPONENT Forgot Password END ================================= -->

{% endblock %}
